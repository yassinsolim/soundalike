<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>soundalike — find songs that feel the same</title>
<style>
  :root{ --bg:#0a0d12; --card:#12161d; --card2:#171c24; --line:#232a34;
    --txt:#eef1f5; --mut:#8b93a1; --grn:#1db954; --vio:#8b6cff; }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 70% -10%,#15202c 0%,var(--bg) 55%);
    color:var(--txt);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:900px;margin:0 auto;padding:28px 20px 90px}
  .top{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--grn),var(--vio));
    display:grid;place-items:center;font-weight:800;color:#0a0d12}
  h1{font-size:24px;margin:0;letter-spacing:-.02em}
  .sub{color:var(--mut);margin:4px 0 20px}
  .sp-btn{background:var(--grn);color:#06210f;border:0;border-radius:999px;padding:9px 16px;
    font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap}
  .sp-btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .search{position:relative}
  .search input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
    padding:14px 16px;border-radius:12px;font-size:15px;outline:none}
  .search input:focus{border-color:var(--grn)}
  .ac{position:absolute;left:0;right:0;top:54px;background:var(--card2);border:1px solid var(--line);
    border-radius:12px;z-index:20;overflow:hidden;display:none}
  .ac div{padding:10px 14px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ac div:hover,.ac div.sel{background:var(--card)}
  .ac b{color:var(--mut);font-weight:500}
  .hint{color:var(--mut);font-size:12.5px;margin:10px 2px 0}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 6px}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--txt);
    padding:7px 12px;border-radius:999px;font-size:13px;cursor:pointer}
  .chip:hover{border-color:var(--vio)} .chip b{color:var(--mut);font-weight:500}
  .seed{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);
    border-radius:16px;padding:18px;margin:22px 0 14px;display:flex;justify-content:space-between;
    align-items:flex-start;gap:16px}
  .seed h2{margin:0;font-size:19px}.seed .art{color:var(--mut)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{background:#0e1319;border:1px solid var(--line);color:#c7cdd6;border-radius:8px;padding:4px 9px;font-size:12px}
  .save{background:transparent;border:1px solid var(--grn);color:var(--grn);border-radius:10px;
    padding:9px 13px;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap}
  .save:disabled{opacity:.5;cursor:default}
  .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .copy{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
    padding:9px 13px;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap}
  .copy:hover{border-color:var(--vio)}
  ol{list-style:none;margin:0;padding:0}
  li.row{display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:12px}
  li.row:hover{background:var(--card)}
  .rank{width:22px;text-align:right;color:var(--mut)}
  .meta{flex:1;min-width:0}.meta .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .a{color:var(--mut);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar{width:92px;height:6px;background:#0e1319;border-radius:6px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--vio),var(--grn))}
  .play{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:9px;
    padding:8px 12px;font-size:13px;cursor:pointer;text-decoration:none;white-space:nowrap}
  .play:hover{border-color:var(--grn)}
  .state{color:var(--mut);padding:26px 4px}.err{color:#ff8a8a}
  .foot{color:var(--mut);font-size:12px;margin-top:28px;border-top:1px solid var(--line);padding-top:14px}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);
    border-top-color:var(--grn);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="logo">◈</div><h1>soundalike</h1></div>
    <button class="sp-btn ghost" id="sp">Log in with Spotify</button>
  </div>
  <div class="sub">Find songs that <i>feel</i> the same — matched by how they actually sound, not tags.</div>

  <div class="search">
    <input id="q" placeholder="Search a song…  (e.g. Plastic Love, or Redbone Childish Gambino)" autocomplete="off"/>
    <div class="ac" id="ac"></div>
  </div>
  <div class="hint" id="hint">Type a song and pick it from the list. This hosted demo covers ~87,000 songs.</div>

  <div class="chips" id="chips"></div>
  <div id="out"></div>
  <div class="foot" id="foot"></div>
</div>
<script>
// ---- config: set to your Spotify app's Client ID to enable playlist saving.
// A Spotify Client ID is NOT a secret (it's exposed in the OAuth URL anyway).
// Leave empty to run recommendations only (no login needed for those).
const SPOTIFY_CLIENT_ID = "6aae8635d21e471cabdeacd2f226640e";
const SCOPES = "playlist-modify-private playlist-modify-public";
const $=s=>document.querySelector(s);
let token=sessionStorage.getItem("sa_token")||"", lastResults=[], lastSeed=null, acItems=[], acSel=-1;
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// ---------- Spotify OAuth 2.0 (Authorization Code + PKCE, 100% client-side) ----------
// No password ever reaches us: the browser redirects to accounts.spotify.com,
// the user approves there, and comes back with a code we exchange for a token.
// The token lives only in this tab; playlist writes go browser→Spotify directly.
const REDIRECT_URI = location.origin + location.pathname;
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}
async function sha256(str){return await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));}
function randStr(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return b64url(a.buffer);}

async function login(){
  if(!SPOTIFY_CLIENT_ID){ alert("Set SPOTIFY_CLIENT_ID at the top of index.html to enable Spotify login. Recommendations work without it."); return; }
  const verifier=randStr(64); sessionStorage.setItem("sa_verifier",verifier);
  const state=randStr(8); sessionStorage.setItem("sa_state",state);
  const challenge=b64url(await sha256(verifier));
  const p=new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,response_type:"code",
    redirect_uri:REDIRECT_URI,code_challenge_method:"S256",code_challenge:challenge,
    scope:SCOPES,state:state});
  location.href="https://accounts.spotify.com/authorize?"+p.toString();
}
async function handleRedirect(){
  const q=new URLSearchParams(location.search); const code=q.get("code");
  if(!code) return;
  // CSRF: the returned state must match the one we stored before redirecting.
  const expected=sessionStorage.getItem("sa_state")||"";
  if(!expected || q.get("state")!==expected){ history.replaceState({},"",REDIRECT_URI); return; }
  sessionStorage.removeItem("sa_state");
  const verifier=sessionStorage.getItem("sa_verifier")||"";
  try{
    const r=await fetch("https://accounts.spotify.com/api/token",{method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:new URLSearchParams({grant_type:"authorization_code",code,redirect_uri:REDIRECT_URI,
        client_id:SPOTIFY_CLIENT_ID,code_verifier:verifier})});
    const d=await r.json();
    if(d.access_token){ token=d.access_token; sessionStorage.setItem("sa_token",token); }
  }catch(e){}
  history.replaceState({},"",REDIRECT_URI);   // clean ?code from the URL
  updateSpBtn();
}
function logout(){ token=""; sessionStorage.removeItem("sa_token"); updateSpBtn(); }
function updateSpBtn(){
  const b=$("#sp");
  if(token){ b.textContent="✓ Spotify connected"; b.classList.remove("ghost"); b.onclick=logout; }
  else{ b.textContent="Log in with Spotify"; b.classList.add("ghost"); b.onclick=login; }
}

// ---------- library search + autocomplete ----------
let acTimer=null;
async function onType(){
  const v=$("#q").value.trim(); clearTimeout(acTimer);
  if(v.length<2){ hideAc(); return; }
  acTimer=setTimeout(async()=>{
    try{ const r=await fetch("/api/search?q="+encodeURIComponent(v)); const d=await r.json();
      acItems=d.results||[]; acSel=-1; renderAc();
    }catch(e){ hideAc(); }
  },160);
}
function renderAc(){
  const ac=$("#ac");
  if(!acItems.length){ hideAc(); return; }
  ac.innerHTML=acItems.map((s,i)=>`<div data-i="${i}" class="${i===acSel?'sel':''}">${esc(s.title)} <b>· ${esc(s.artist)}</b></div>`).join("");
  ac.style.display="block";
  ac.querySelectorAll("div").forEach(el=>el.onclick=()=>pick(acItems[+el.dataset.i]));
}
function hideAc(){ $("#ac").style.display="none"; acItems=[]; }

// ---------- recommend ----------
async function pick(item){
  hideAc(); $("#q").value=`${item.title} — ${item.artist}`;
  $("#out").innerHTML='<div class="state"><span class="spin"></span> matching…</div>';
  try{
    const r=await fetch("/api/recommend",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(item.row!=null?{row:item.row,n:20,diversity:0.15}:{query:$("#q").value,n:20,diversity:0.15})});
    const d=await r.json();
    if(!d.ok){ $("#out").innerHTML=`<div class="state err">${esc(d.error||"No match.")}</div>`; return; }
    render(d);
  }catch(e){ $("#out").innerHTML=`<div class="state err">Server error.</div>`; }
}
function render(d){
  lastResults=d.results; lastSeed=d.seed; const v=d.vibe;
  const mx=Math.max(...d.results.map(x=>x.neural_sim),0.001);
  let html=`<div class="seed"><div>
      <h2>${esc(d.seed.title)}</h2><div class="art">${esc(d.seed.artist)}</div>
      <div class="tags"><span class="tag">${esc(v.low_end)}</span><span class="tag">${esc(v.dynamics)}</span><span class="tag">${esc(v.tone)}</span></div>
    </div><div class="actions">
      <button class="copy" id="copy">⧉ Copy list</button>
      <button class="save" id="save">＋ Save to Spotify</button>
    </div></div><ol>`;
  d.results.forEach((x,i)=>{ const w=Math.round(100*x.neural_sim/mx);
    html+=`<li class="row"><div class="rank">${i+1}</div>
      <div class="meta"><div class="t">${esc(x.title)}</div><div class="a">${esc(x.artist)}</div></div>
      <div class="bar"><i style="width:${w}%"></i></div>
      <a class="play" href="${x.spotify_url}" target="_blank" rel="noopener">Open in Spotify ▸</a></li>`;});
  html+="</ol>";
  $("#out").innerHTML=html; $("#save").onclick=savePlaylist; $("#copy").onclick=copyList;
  $("#foot").textContent=`Matched from a ${d.library_size.toLocaleString()}-track library.`;
}

// ---------- copy list (no login, works for EVERYONE) ----------
async function copyList(){
  const b=$("#copy"); const text=lastResults.map(x=>`${x.title} — ${x.artist}`).join("\n");
  try{ await navigator.clipboard.writeText(text);
    const old=b.textContent; b.textContent=`✓ Copied ${lastResults.length} songs`;
    setTimeout(()=>{b.textContent=old;},2200);
  }catch(e){ window.prompt("Copy your soundalikes:", text); }
}
function saveNote(msg){
  let n=$("#savenote");
  if(!n){ n=document.createElement("div"); n.id="savenote"; n.className="hint"; n.style.marginTop="10px"; n.style.color="#ffb4b4"; const s=document.querySelector(".seed"); if(s) s.after(n); }
  n.textContent=msg;
}
// ---------- save playlist (browser → Spotify, no server, no credentials to us) ----------
async function spSearch(t,a){
  const r=await fetch("https://api.spotify.com/v1/search?type=track&limit=1&q="+encodeURIComponent(`${t} ${a}`),
    {headers:{Authorization:"Bearer "+token}}); const d=await r.json();
  return (((d.tracks||{}).items||[])[0]||{}).uri||null;
}
function saveBlocked(b){
  b.disabled=false; b.textContent="⧉ Copy list instead"; b.onclick=copyList;
  saveNote("Spotify limits new apps to 5 approved testers, so one-click save only works for allowlisted accounts. Everyone can use “Copy list” and paste into a new Spotify playlist, and every result has an Open-in-Spotify link.");
}
async function savePlaylist(){
  const b=$("#save");
  if(!SPOTIFY_CLIENT_ID){ saveNote("Spotify login isn't set up on this instance — use “Copy list”."); return; }
  if(!token){ login(); return; }
  b.disabled=true; b.textContent="Resolving…";
  try{
    const meRes=await fetch("https://api.spotify.com/v1/me",{headers:{Authorization:"Bearer "+token}});
    if(meRes.status===401){ logout(); return saveBlocked(b); }
    if(meRes.status===403) return saveBlocked(b);
    const me=await meRes.json();
    const uris=[]; for(const x of lastResults){ const u=await spSearch(x.title,x.artist); if(u)uris.push(u); }
    if(!uris.length){ b.textContent="✕ none resolved"; b.disabled=false; return; }
    const plRes=await fetch(`https://api.spotify.com/v1/users/${me.id}/playlists`,{method:"POST",
      headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({name:`soundalike · ${lastSeed.title}`,description:"Made with soundalike.",public:false})});
    if(plRes.status===403) return saveBlocked(b);
    const pl=await plRes.json();
    for(let i=0;i<uris.length;i+=100){ await fetch(`https://api.spotify.com/v1/playlists/${pl.id}/tracks`,{method:"POST",
      headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({uris:uris.slice(i,i+100)})}); }
    b.textContent=`✓ Saved ${uris.length} songs`;
    if(pl.external_urls&&pl.external_urls.spotify) window.open(pl.external_urls.spotify,"_blank");
  }catch(e){ b.textContent="✕ save failed"; b.disabled=false; }
}

// ---------- demo seed chips ----------
const DEMO=[["Plastic Love","Mariya Takeuchi"],["Redbone","Childish Gambino"],["Only Shallow","My Bloody Valentine"],
  ["money machine","100 gecs"],["Chamber of Reflection","Mac DeMarco"],["Close Eyes","DVRST"]];
function loadChips(){ $("#chips").innerHTML=DEMO.map((s,i)=>`<button class="chip" data-i="${i}">${esc(s[0])} <b>· ${esc(s[1])}</b></button>`).join("");
  $("#chips").querySelectorAll("button").forEach(el=>el.onclick=()=>{const s=DEMO[+el.dataset.i];pick({title:s[0],artist:s[1],row:null});}); }

// ---------- init ----------
$("#q").addEventListener("input",onType);
$("#q").addEventListener("keydown",e=>{
  if(!acItems.length) return;
  if(e.key==="ArrowDown"){acSel=Math.min(acSel+1,acItems.length-1);renderAc();e.preventDefault();}
  else if(e.key==="ArrowUp"){acSel=Math.max(acSel-1,0);renderAc();e.preventDefault();}
  else if(e.key==="Enter"){ pick(acItems[acSel<0?0:acSel]); }
});
document.addEventListener("click",e=>{ if(!e.target.closest(".search")) hideAc(); });
handleRedirect(); updateSpBtn(); loadChips();
</script>
</body>
</html>
